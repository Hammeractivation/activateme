name = "activateme-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true

[observability]
enabled = true

# Create KV: wrangler kv namespace create ACTIVATE_RATE_LIMIT
# Then paste the id below:
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "4c388febb522466b8ae5cfec8893b264"

[vars]
# Non-secret repo metadata (same names as existing activators)
HAMMER_KEYS_OWNER = "dvahana2424-web"
HAMMER_KEYS_REPO = "sojorepobakup"
HAMMER_HWID_OWNER = "dvahana2424-web"
HAMMER_HWID_REPO = "pilayrepobackup"

VALVEOFF_KEYS_OWNER = "hammerwebsite12"
VALVEOFF_KEYS_REPO = "repovalveoff"
VALVEOFF_HWID_OWNER = "hammerwebsite12"
VALVEOFF_HWID_REPO = "hanaoff"

ONETAP_KEYS_OWNER = "dvahana2424-web"
ONETAP_KEYS_REPO = "onetaprepobackup"
ONETAP_HWID_OWNER = "dvahana2424-web"
ONETAP_HWID_REPO = "pilayrepobackup"

GAMENATIVE_KEYS_OWNER = "hammerwebsite12"
GAMENATIVE_KEYS_REPO = "class12repo"
GAMENATIVE_HWID_OWNER = "hammerwebsite12"
GAMENATIVE_HWID_REPO = "class12"

# Secrets ? set via: wrangler secret put SECRET_NAME
# HAMMER_KEYS_PAT
# HAMMER_HWID_PAT
# VALVEOFF_KEYS_PAT
# VALVEOFF_HWID_PAT
# ONETAP_KEYS_PAT
# ONETAP_HWID_PAT
# GAMENATIVE_KEYS_PAT
# GAMENATIVE_HWID_PAT
# DISCORD_WEBHOOK_URL
